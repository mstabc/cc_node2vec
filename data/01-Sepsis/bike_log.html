<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bike Factory Simulation + Event Log</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      background-color: #f4f4f4;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0 0 0;
      gap: 30px;
    }
    svg {
      background-color: #2c2c2c;
      border: 2px solid #555;
      margin-bottom: 12px;
    }
    .event-log-table {
      background: #fff;
      border-radius: 9px;
      box-shadow: 0 2px 12px #0001;
      border-collapse: collapse;
      margin-top: 4px;
      width: 380px;
      min-width: 310px;
      font-size: 15px;
      overflow: hidden;
    }
    .event-log-table thead th {
      background: #4285f4;
      color: #fff;
      font-weight: bold;
      letter-spacing: 0.5px;
      padding: 8px 12px;
    }
    .event-log-table tbody tr {
      transition: background 0.3s, filter 0.7s, opacity 0.7s;
    }
    .event-log-table tbody tr.latest {
      background: #e3f0ff !important;
      font-weight: bold;
    }
    .event-log-table tbody tr.faded-1 { opacity: 0.85; filter: blur(0.5px) grayscale(10%);}
    .event-log-table tbody tr.faded-2 { opacity: 0.70; filter: blur(1px) grayscale(20%);}
    .event-log-table tbody tr.faded-3 { opacity: 0.58; filter: blur(1.5px) grayscale(30%);}
    .event-log-table tbody tr.faded-4 { opacity: 0.46; filter: blur(2px) grayscale(40%);}
    .event-log-table tbody tr.faded-5 { opacity: 0.36; filter: blur(2.5px) grayscale(50%);}
    .event-log-table tbody tr.faded-6 { opacity: 0.28; filter: blur(3px) grayscale(60%);}
    .event-log-table tbody tr.faded-7 { opacity: 0.20; filter: blur(3.5px) grayscale(70%);}
    .event-log-table tbody tr.faded-8 { opacity: 0.13; filter: blur(4px) grayscale(80%);}
    .event-log-table tbody tr.faded-9 { opacity: 0.07; filter: blur(4.5px) grayscale(90%);}
    .event-log-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #e7e7e7;
      background: #fff;
    }
    .event-log-table tr:last-child td {
      border-bottom: none;
    }
    .station {
      fill: #333;
      stroke: white;
      stroke-width: 3px;
      rx: 12;
      ry: 12;
    }
    .label {
      fill: white;
      font-size: 14px;
      font-weight: bold;
      text-anchor: middle;
    }
    .icon {
      font-size: 20px;
      text-anchor: middle;
      pointer-events: none;
    }
    .token {
      stroke: white;
      stroke-width: 1px;
    }
  </style>
</head>
<body>
<div class="container">
  <svg width="1000" height="400"></svg>
  <div>
    <table class="event-log-table">
      <thead>
        <tr>
          <th>Case ID</th>
          <th>Task Name</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="eventLogBody"></tbody>
    </table>
  </div>
</div>
<script>
const svg = d3.select("svg");
const boxWidth = 140, boxHeight = 70, gapX = 160, gapY = 130;

const stationDefs = [
  { id: "Start", row: 0, col: 0, icon: "🏁" },
  { id: "Attach Frame", row: 0, col: 1, icon: "🔩" },
  { id: "Install Wheels", row: 0, col: 2, icon: "🚲" },
  { id: "Mount Handlebars", row: 0, col: 3, icon: "🛠️" },
  { id: "Quality Check", row: 1, col: 0, icon: "✅" },
  { id: "Rework", row: 1, col: 1, icon: "♻️" },
  { id: "Final Inspection", row: 1, col: 2, icon: "🔍" },
  { id: "End", row: 1, col: 3, icon: "🏆" }
];

const flow = {
  "Start": ["Attach Frame"],
  "Attach Frame": ["Install Wheels"],
  "Install Wheels": ["Mount Handlebars"],
  "Mount Handlebars": ["Quality Check"],
  "Quality Check": ["Final Inspection", "Rework"],
  "Rework": ["Final Inspection"],
  "Final Inspection": ["End"]
};

const getPos = (row, col) => ({
  x: 60 + col * gapX,
  y: 60 + row * gapY
});

const stationMap = {};
stationDefs.forEach(station => {
  const pos = getPos(station.row, station.col);
  station.x = pos.x;
  station.y = pos.y;
  stationMap[station.id] = station;
});

// Draw stations
svg.selectAll(".station")
  .data(stationDefs)
  .enter()
  .append("rect")
  .attr("class", "station")
  .attr("x", d => d.x)
  .attr("y", d => d.y)
  .attr("width", boxWidth)
  .attr("height", boxHeight)
  .attr("rx", 12)
  .attr("ry", 12);

// Labels
svg.selectAll(".label")
  .data(stationDefs)
  .enter()
  .append("text")
  .attr("class", "label")
  .attr("x", d => d.x + boxWidth / 2)
  .attr("y", d => d.y + boxHeight - 10)
  .text(d => d.id);

// Icons
svg.selectAll(".icon")
  .data(stationDefs)
  .enter()
  .append("text")
  .attr("class", "icon")
  .attr("x", d => d.x + boxWidth / 2)
  .attr("y", d => d.y + 28)
  .text(d => d.icon);

const tokenIdGen = () => Math.floor(Math.random() * 1e6);
const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

let eventLog = [];

// Format timestamp
function timeStr(date) {
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// Update event log table to show only latest 10, fading/blurring old ones
function updateEventLogTable() {
  const tbody = document.getElementById("eventLogBody");
  tbody.innerHTML = "";
  const visible = eventLog.slice(-10);
  visible.forEach((e, idx) => {
    const row = document.createElement("tr");
    row.innerHTML = `<td><b>${e.caseId}</b></td><td>${e.task}</td><td>${e.timestamp}</td>`;
    if(idx === visible.length-1) {
      row.classList.add("latest");
    } else if(idx < visible.length-1) {
      const fadedClass = `faded-${visible.length-1-idx}`;
      row.classList.add(fadedClass);
    }
    tbody.appendChild(row);
  });
}

// Log an event
function addEventLogRow(caseId, task, timestamp) {
  eventLog.push({caseId, task, timestamp});
  updateEventLogTable();
}

// Move a token and record events
function moveToken(token) {
  const current = token.current;
  addEventLogRow(token.caseId, current, timeStr(new Date()));

  const options = flow[current];
  if (!options) {
    // End: remove token and respawn after delay
    token.el.transition().duration(500).style("opacity", 0).remove();
    setTimeout(spawnToken, 1000 + Math.random() * 2000);
    return;
  }

  const next = (current === "Quality Check")
    ? (Math.random() < 0.7 ? "Final Inspection" : "Rework")
    : options[Math.floor(Math.random() * options.length)];

  const nextPos = stationMap[next];
  token.el.transition()
    .duration(1000)
    .attr("cx", nextPos.x + boxWidth / 2 + (Math.random() * 20 - 10))
    .attr("cy", nextPos.y + boxHeight / 2 + (Math.random() * 20 - 10))
    .on("end", () => {
      token.current = next;
      if (next !== "End") {
        setTimeout(() => moveToken(token), 800 + Math.random() * 1200);
      } else {
        moveToken(token);
      }
    });
}

// Spawn a new token
function spawnToken() {
  const id = tokenIdGen();
  const color = colorScale(id);
  const caseId = "B" + id.toString().slice(-4); // Short case id
  const token = svg.append("circle")
    .attr("class", "token")
    .attr("id", `token-${id}`)
    .attr("r", 8)
    .attr("fill", color);

  moveToken({ id, color, caseId, current: "Start", el: token });
}

// Initialize with N tokens
d3.range(6).forEach((_, i) => setTimeout(spawnToken, i * 700));
</script>
</body>
</html>
