<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sepsis Treatment Token Replay + Event Log</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      background-color: #f4f4f4;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 0 0 0;
      gap: 32px;
    }
    svg {
      background-color: #2c2c2c;
      border: 2px solid #555;
      margin-bottom: 12px;
    }
    .event-log-table {
      background: #fff;
      border-radius: 9px;
      box-shadow: 0 2px 12px #0001;
      border-collapse: collapse;
      margin-top: 4px;
      width: 400px;
      min-width: 310px;
      font-size: 15px;
      overflow: hidden;
    }
    .event-log-table thead th {
      background: #43a047;
      color: #fff;
      font-weight: bold;
      letter-spacing: 0.5px;
      padding: 8px 12px;
    }
    .event-log-table tbody tr {
      transition: background 0.3s, filter 0.7s, opacity 0.7s;
    }
    .event-log-table tbody tr.latest {
      background: #e8f5e9 !important;
      font-weight: bold;
    }
    .event-log-table tbody tr.faded-1 { opacity: 0.85; filter: blur(0.5px) grayscale(10%);}
    .event-log-table tbody tr.faded-2 { opacity: 0.70; filter: blur(1px) grayscale(20%);}
    .event-log-table tbody tr.faded-3 { opacity: 0.58; filter: blur(1.5px) grayscale(30%);}
    .event-log-table tbody tr.faded-4 { opacity: 0.46; filter: blur(2px) grayscale(40%);}
    .event-log-table tbody tr.faded-5 { opacity: 0.36; filter: blur(2.5px) grayscale(50%);}
    .event-log-table tbody tr.faded-6 { opacity: 0.28; filter: blur(3px) grayscale(60%);}
    .event-log-table tbody tr.faded-7 { opacity: 0.20; filter: blur(3.5px) grayscale(70%);}
    .event-log-table tbody tr.faded-8 { opacity: 0.13; filter: blur(4px) grayscale(80%);}
    .event-log-table tbody tr.faded-9 { opacity: 0.07; filter: blur(4.5px) grayscale(90%);}
    .event-log-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #e7e7e7;
      background: #fff;
    }
    .event-log-table tr:last-child td {
      border-bottom: none;
    }
    .station {
      fill: #34495e;
      stroke: #fff;
      stroke-width: 4px;
      rx: 13;
      ry: 13;
    }
    .station-label {
      fill: #fff;
      font-size: 15px;
      font-weight: bold;
      text-anchor: middle;
      pointer-events: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .station-icon {
      font-size: 1.6em;
      text-anchor: middle;
      pointer-events: none;
      dominant-baseline: middle;
    }
    .token {
      stroke: white;
      stroke-width: 1.5px;
    }
  </style>
</head>
<body>
<div class="container">
  <svg width="1100" height="400"></svg>
  <div>
    <table class="event-log-table">
      <thead>
        <tr>
          <th>Case ID</th>
          <th>Task Name</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="eventLogBody"></tbody>
    </table>
  </div>
</div>
<script>
const svg = d3.select("svg");
const boxWidth = 135, boxHeight = 70, gapX = 35, gapY = 105;

// Selected main steps
const stationDefs = [
  { id: "Start", row: 0, col: 0, icon: "🏥" },
  { id: "ER Registration", row: 0, col: 1, icon: "📝" },
  { id: "ER Triage", row: 0, col: 2, icon: "🧑‍⚕️" },
  { id: "CRP", row: 0, col: 3, icon: "🧪" },
  { id: "Leucocytes", row: 0, col: 4, icon: "🧬" },
  { id: "IV Liquid", row: 1, col: 0, icon: "💧" },
  { id: "IV Antibiotics", row: 1, col: 1, icon: "💉" },
  { id: "Release A", row: 1, col: 2, icon: "🔓" },
  { id: "Release B", row: 1, col: 3, icon: "🔑" },
  { id: "Release C", row: 1, col: 4, icon: "🔓" },
  { id: "Return ER", row: 1, col: 5, icon: "↩️" },
  { id: "End", row: 0, col: 5, icon: "🏁" }
];

const flow = {
  "Start": ["ER Registration", "ER Triage"],
  "ER Registration": ["CRP", "Leucocytes", "IV Liquid"],
  "ER Triage": ["CRP", "Leucocytes"],
  "CRP": ["IV Liquid", "IV Antibiotics", "End"],
  "Leucocytes": ["IV Liquid", "End"],
  "IV Liquid": ["IV Antibiotics", "Release B", "Release A", "End"],
  "IV Antibiotics": ["Release A", "Release B", "End"],
  "Release A": ["Release B", "Release C", "Return ER", "End"],
  "Release B": ["Release C", "Return ER", "End"],
  "Release C": ["Return ER", "End"],
  "Return ER": ["End"]
};

// Positioning
const getPos = (row, col) => ({
  x: 50 + col * (boxWidth + gapX),
  y: 55 + row * gapY
});

const stationMap = {};
stationDefs.forEach(station => {
  const pos = getPos(station.row, station.col);
  station.x = pos.x;
  station.y = pos.y;
  stationMap[station.id] = station;
});

// Draw stations
svg.selectAll(".station")
  .data(stationDefs)
  .enter()
  .append("rect")
  .attr("class", "station")
  .attr("x", d => d.x)
  .attr("y", d => d.y)
  .attr("width", boxWidth)
  .attr("height", boxHeight)
  .attr("rx", 13)
  .attr("ry", 13);

// Labels
svg.selectAll(".station-label")
  .data(stationDefs)
  .enter()
  .append("text")
  .attr("class", "station-label")
  .attr("x", d => d.x + boxWidth / 2)
  .attr("y", d => d.y + boxHeight - 12)
  .text(d => d.id);

// Icons
svg.selectAll(".station-icon")
  .data(stationDefs)
  .enter()
  .append("text")
  .attr("class", "station-icon")
  .attr("x", d => d.x + boxWidth / 2)
  .attr("y", d => d.y + 33)
  .text(d => d.icon);

const tokenIdGen = () => Math.floor(Math.random() * 1e6);
const colorScale = d3.scaleOrdinal(d3.schemeCategory10);

let eventLog = [];

function timeStr(date) {
  return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function updateEventLogTable() {
  const tbody = document.getElementById("eventLogBody");
  tbody.innerHTML = "";
  const visible = eventLog.slice(-10);
  visible.forEach((e, idx) => {
    const row = document.createElement("tr");
    row.innerHTML = `<td><b>${e.caseId}</b></td><td>${e.task}</td><td>${e.timestamp}</td>`;
    if(idx === visible.length-1) {
      row.classList.add("latest");
    } else if(idx < visible.length-1) {
      const fadedClass = `faded-${visible.length-1-idx}`;
      row.classList.add(fadedClass);
    }
    tbody.appendChild(row);
  });
}

function addEventLogRow(caseId, task, timestamp) {
  eventLog.push({caseId, task, timestamp});
  updateEventLogTable();
}

function moveToken(token) {
  const current = token.current;
  addEventLogRow(token.caseId, current, timeStr(new Date()));

  const options = flow[current];
  if (!options) {
    token.el.transition().duration(500).style("opacity", 0).remove();
    setTimeout(spawnToken, 900 + Math.random() * 1200);
    return;
  }

  // Branching logic (simulate patient variability)
  let next = options[Math.floor(Math.random() * options.length)];
  // Avoid endless loops
  if(token.visited && token.visited.length > 15) next = "End";
  if(!token.visited) token.visited = [];
  token.visited.push(current);

  const nextPos = stationMap[next];
  token.el.transition()
    .duration(1000)
    .attr("cx", nextPos.x + boxWidth / 2 + (Math.random() * 18 - 9))
    .attr("cy", nextPos.y + boxHeight / 2 + (Math.random() * 18 - 9))
    .on("end", () => {
      token.current = next;
      if (next !== "End") {
        setTimeout(() => moveToken(token), 650 + Math.random() * 1200);
      } else {
        moveToken(token);
      }
    });
}

function spawnToken() {
  const id = tokenIdGen();
  const color = colorScale(id);
  const caseId = "S" + id.toString().slice(-4);
  const token = svg.append("circle")
    .attr("class", "token")
    .attr("id", `token-${id}`)
    .attr("r", 11)
    .attr("fill", color);

  moveToken({ id, color, caseId, current: "Start", el: token });
}

// Launch a few tokens to start
d3.range(6).forEach((_, i) => setTimeout(spawnToken, i * 700));
</script>
</body>
</html>
